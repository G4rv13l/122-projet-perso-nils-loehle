<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematon - Mon catalogue de films visionnés</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Cinematon</h1>
    <p>Gestionnaire de films JavaScript</p>
  </header>

  <main>
    <!-- Barre de recherche -->
    <section class="controls">
      <input type="text" id="recherche" placeholder="Chercher un film/réalisateur" aria-label="Champ de recherche">

      <form id="formulaire-ajout">
        <input type="text" id="input-titre" placeholder="Titre" aria-label="Titre du film" required/>
        <!-- 1888 -> date du plus vieux film connu -->
        <input type="number" id="input-annee" placeholder="Année" aria-label="Année du film" required
        min="1888" max="2026"/>

        <input type="text" id="input-genre" placeholder="Genre" aria-label="Genre du film" required/>
        <input type="text" id="input-real" placeholder="Réalisateur" aria-label="Réalisateur du film" required/>

        <input type="number" id="input-note" placeholder="Note (0 à 10)" aria-label="Note du film" required
        min="0" max="10" step="0.1"/>

        <button type="submit" id="btn-ajout">Ajouter le film</button>
      </form>

      <!-- Contrôle de tri -->
      <div id="tri" class="tri">
        <label for="tri-select">Trier par :</label>
        <select id="tri-select">
          <option value="annee-decroiss">Année (🎲🥐)</option>
          <option value="annee-croiss">Année (🥐)</option>
          <option value="real-croiss">Réalisateur (🥐)</option>
          <option value="real-decroiss">Réalisateur (🎲🥐)</option>
          <option value="note">Note (🎲🥐)</option>
        </select>
      </div>
    </section>

    <!-- Conteneur des films en grille -->
    <section id="films-container" class="films-grid"></section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
